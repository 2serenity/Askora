services:
  db:
    image: postgres:16-alpine
    container_name: analytics-db
    environment:
      POSTGRES_DB: analytics_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics_hub"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    container_name: analytics-api
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: analytics-web
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres-data:
